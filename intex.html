<div style="
    margin: 50px auto; 
    padding: 30px; 
    max-width: 500px; 
    border: 2px solid #00ff88; 
    background-color: rgba(0,0,0,0.9); 
    box-shadow: 0 0 20px #00ff88; 
    text-align: center; 
    font-family: 'Courier New', monospace;">

    <h2 style="color: #00ff88; text-transform: uppercase;">Supporta la Didattica</h2>
    
    <p style="color: #fff; font-size: 0.9em; margin-bottom: 20px;">
        Ogni <span style="color: #f7931a; font-weight: bold;">3 mBTC</span> un nuovo progetto Scratch.
    </p>

    <div style="margin-bottom: 15px;">
        <label style="color: #00ff88; display: block; margin-bottom: 5px;">Importo (mBTC):</label>
        <input type="number" id="btcAmount" placeholder="es. 3" style="
            background: #111; 
            border: 1px solid #00ff88; 
            color: #00ff88; 
            padding: 10px; 
            text-align: center; 
            width: 80%;
            outline: none;">
    </div>

    <a href="#" onclick="inviaDonazione()" style="
        background-color: #f7931a; 
        color: #000; 
        padding: 15px 25px; 
        text-decoration: none; 
        font-weight: bold; 
        display: inline-block; 
        border-radius: 5px; 
        box-shadow: 0 0 10px #f7931a;
        margin-bottom: 20px;">
        INVIA DONAZIONE ₿
    </a>

    <div style="margin-top: 10px;">
        <p style="color: #888; font-size: 0.7em; margin-bottom: 5px;">IL MIO WALLET CODE:</p>
        <code id="walletAddress" style="display: block; background: #222; color: #00ff88; padding: 10px; font-size: 0.8em; border: 1px solid #333; word-break: break-all;">
            IL_TUO_INDIRIZZO_BITCOIN_QUI
        </code>
    </div>
</div>

<script>
function inviaDonazione() {
    // 1. Prendi l'indirizzo dal testo della pagina
    var address = document.getElementById('walletAddress').innerText.trim();
    // 2. Prendi l'importo scritto dall'utente
    var amount = document.getElementById('btcAmount').value;
    
    // 3. Crea il link Bitcoin (trasformando mBTC in BTC dividendo per 1000)
    var btcValue = amount / 1000;
    
    if(amount > 0) {
        window.location.href = "bitcoin:" + address + "?amount=" + btcValue;
    } else {
        alert("Inserisci un importo valido prima di donare!");
    }
}
</script>
